repos:
  - repo: local
    hooks:
      - id: format
        entry: pixi run ruff format
        language: system
        types: [python]
      - id: lint
        entry: pixi run ruff check --fix
        language: system
        types: [python]
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout