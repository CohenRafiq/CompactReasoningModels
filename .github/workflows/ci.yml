name: ML CI

on: [pull_request]

jobs:
  # ═════════════════════════════════════════════════════════════════
  # 1. FAST CHECKS
  # ═════════════════════════════════════════════════════════════════
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.6.0
        with:
          pixi-version: v0.19.0
          cache: true
      
      - name: Lint
        run: pixi run lint
      
      - name: Type check
        run: pixi run type-check
      
      - name: Unit tests
        run: pixi run test

  # ═════════════════════════════════════════════════════════════════
  # 2. NOTEBOOK VALIDATION
  # ═════════════════════════════════════════════════════════════════
  notebooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.6.0
      
      - name: Execute notebooks
        run: |
          # Convert notebooks to Python, execute, fail on error
          pixi run jupyter nbconvert --to notebook --execute \
            notebooks/01-*.ipynb \
            notebooks/02-*.ipynb \
            --output /tmp/executed/